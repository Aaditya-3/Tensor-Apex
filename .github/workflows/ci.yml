name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: bash scripts/self_check.sh

  runtime-proof:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: mkdir -p artifacts
      - run: python scripts/validate_openenv_contract.py > artifacts/openenv_contract.json
      - run: bash scripts/docker_smoke.sh
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-proof
          path: artifacts/
